name: Keepalive

on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump activity counter
        run: |
          FILE="ACTIVITY.md"
          COUNT=0
          if [ -f "$FILE" ]; then
            COUNT=$(grep -oP 'Heartbeat count: \K\d+' "$FILE" || echo 0)
          fi
          COUNT=$((COUNT + 1))
          echo "<!-- Auto-generated by keepalive workflow -->" > "$FILE"
          echo "# Repo Activity" >> "$FILE"
          echo "Heartbeat count: ${COUNT}" >> "$FILE"
          echo "Last pulse: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$FILE"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ACTIVITY.md
          git commit -m "chore: monthly keepalive pulse" || echo "No changes"
          git push
